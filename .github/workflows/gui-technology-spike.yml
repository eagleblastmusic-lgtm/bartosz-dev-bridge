name: Control Center GUI CI

on:
  pull_request:
    branches: [main, gpt-work/control-center-operation-flow]
    paths:
      - ".github/workflows/gui-technology-spike.yml"
      - "pyproject.toml"
      - "bdb_gui/**"
      - "bdb_operator/**"
      - "spikes/gui/**"
      - "tests/test_gui_*.py"
      - "tests/test_operator_session_projection*.py"
      - "tests/session_projection_fixture.py"
      - "schemas/bdb-gui-*.schema.json"
      - "schemas/bdb-control-center-smoke-v1.schema.json"
      - "docs/BDB_GUI_TECHNOLOGY_SPIKE.md"
      - "docs/BDB_CONTROL_CENTER_SKELETON.md"
      - "docs/BDB_CONTROL_CENTER_PROCESS_CONTROLS.md"
      - "docs/BDB_CONTROL_CENTER_CURRENT_OPERATION.md"
      - "docs/BDB_CONTROL_CENTER_HISTORY.md"
      - "docs/BDB_CONTROL_CENTER_DIAGNOSTICS.md"
      - "docs/BDB_CONTROL_CENTER_PROJECT_WIZARD.md"
      - "docs/BDB_CONTROL_CENTER_TRAY_NOTIFICATIONS.md"
      - "docs/adr/0006-pyside6-qt-widgets-for-control-center-mvp.md"
      - "docs/adr/0007-read-only-asynchronous-gui-bootstrap.md"
      - "docs/adr/0008-explicit-serialized-process-controls.md"
      - "docs/adr/0009-read-only-current-operation-view.md"
      - "docs/adr/0010-bounded-manual-journal-history.md"
      - "docs/adr/0011-explicit-sanitized-diagnostics-export.md"
      - "docs/adr/0012-two-gate-project-prepare-wizard.md"
      - "docs/adr/0013-event-driven-local-tray.md"
      - "docs/adr/README.md"
  push:
    branches: [gpt-work/control-center-session-receipts]

permissions:
  contents: read

jobs:
  pyside6-windows-smoke:
    name: Control Center / Windows / Python 3.12
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install optional GUI dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev,gui]"
      - name: Compile GUI and operator packages
        run: |
          python -m compileall -q bdb_gui bdb_operator
          python -m py_compile spikes/gui/pyside6_probe.py
      - name: Run P05-P11 architecture and schema contracts
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_gui_skeleton_contract.py
          tests/test_gui_diagnostics_architecture.py
          tests/test_gui_project_prepare_architecture.py
          tests/test_gui_session_history_architecture.py
          tests/test_gui_schema_contract.py
          tests/test_gui_technology_spike_contract.py
      - name: Run P12 tray architecture contract
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv tests/test_gui_tray_architecture.py
      - name: Run read-only bootstrap unit tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv tests/test_gui_bootstrap_service.py
      - name: Run explicit process control tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_gui_project_operations.py
          tests/test_gui_process_controls.py
      - name: Run current operation projection tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_gui_current_operation_service.py
          tests/test_gui_current_operation_view.py
          tests/test_gui_current_operation_window.py
          tests/test_gui_operation_flow.py
          tests/test_gui_current_operation_flow_view.py
      - name: Run bounded Journal event history tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_gui_history_service.py
          tests/test_gui_history_view.py
          tests/test_gui_history_window.py
      - name: Run bounded session and receipt history tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_operator_session_projection.py
          tests/test_operator_session_projection_safety.py
          tests/test_gui_session_history.py
          tests/test_gui_session_history_view.py
          tests/test_gui_session_history_window.py
      - name: Run diagnostics collection and export tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_gui_diagnostics_service.py
          tests/test_gui_diagnostics_export.py
          tests/test_gui_diagnostics_view.py
          tests/test_gui_diagnostics_window.py
      - name: Run two-gate project Prepare wizard tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: >-
          python -m pytest -vv
          tests/test_gui_project_prepare_service.py
          tests/test_gui_projects_view.py
          tests/test_gui_project_prepare_window.py
      - name: Run tray and notification tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv tests/test_gui_tray_controller.py
      - name: Run P05 PySide6 probe regression
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv tests/test_gui_pyside6_probe.py
      - name: Run production Control Center smoke tests
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv tests/test_gui_control_center_smoke.py
      - name: Preserve the P05 technology probe gate
        shell: powershell
        env: { QT_QPA_PLATFORM: offscreen }
        run: |
          $report = Join-Path $env:RUNNER_TEMP "pyside6-probe.json"
          python spikes/gui/pyside6_probe.py --headless-smoke --json-out $report
          if ($LASTEXITCODE -ne 0) { throw "PySide6 headless probe failed" }
          $data = Get-Content -LiteralPath $report -Raw | ConvertFrom-Json
          if (
            $data.status -ne "success" -or
            $data.window_constructed -ne $true -or
            $data.mutation_operations_invoked -ne 0 -or
            $data.operator_network_listener -ne $false
          ) {
            $data | ConvertTo-Json -Depth 8 | Write-Host
            throw "PySide6 probe report violates the P05 contract"
          }
          $data | ConvertTo-Json -Depth 8 | Write-Host
      - name: Run production Control Center headless smoke
        shell: powershell
        env: { QT_QPA_PLATFORM: offscreen }
        run: |
          $workspaces = Join-Path $env:RUNNER_TEMP "bdb-control-center-workspaces"
          $report = Join-Path $env:RUNNER_TEMP "bdb-control-center-smoke.json"
          New-Item -ItemType Directory -Path $workspaces -Force | Out-Null
          python -m bdb_gui.app --workspaces-root $workspaces --headless-smoke --json-out $report
          if ($LASTEXITCODE -ne 0) { throw "Production Control Center headless smoke failed" }
          $data = Get-Content -LiteralPath $report -Raw | ConvertFrom-Json
          if (
            $data.status -ne "success" -or
            $data.window_constructed -ne $true -or
            $data.read_only_startup -ne $true -or
            $data.bootstrap_completed -ne $true -or
            $data.bootstrap_ok -ne $true -or
            $data.page_count -ne 5 -or
            $data.project_count -ne 0 -or
            $data.action_controls_present -ne $true -or
            $data.confirmation_required -ne $true -or
            $data.projects_wizard_present -ne $true -or
            $data.prepare_plan_required -ne $true -or
            $data.prepare_confirmation_required -ne $true -or
            $data.prepare_plan_loaded -ne $false -or
            $data.current_operation_view_present -ne $true -or
            $data.current_operation_read_only -ne $true -or
            $data.current_operation_loaded -ne $false -or
            $data.operation_flow_present -ne $true -or
            $data.operation_flow_status -ne "pending" -or
            $data.history_tabs_present -ne $true -or
            $data.history_view_present -ne $true -or
            $data.history_read_only -ne $true -or
            $data.history_loaded -ne $false -or
            $data.session_history_view_present -ne $true -or
            $data.session_history_read_only -ne $true -or
            $data.session_history_loaded -ne $false -or
            $data.session_history_count -ne 0 -or
            $data.session_result_open_explicit -ne $true -or
            $data.session_receipt_open_explicit -ne $true -or
            $data.session_folder_open_explicit -ne $true -or
            $data.session_repair_relationships_inferred -ne $false -or
            $data.diagnostics_view_present -ne $true -or
            $data.diagnostics_collect_explicit -ne $true -or
            $data.diagnostics_export_explicit -ne $true -or
            $data.diagnostics_snapshot_loaded -ne $false -or
            $data.diagnostics_export_completed -ne $false -or
            $data.tray_created -ne $false -or
            $data.mutation_operations_invoked -ne 0 -or
            $data.operator_network_listener -ne $false -or
            $data.event_loop_exit_code -ne 0 -or
            $data.timed_out -ne $false
          ) {
            $data | ConvertTo-Json -Depth 8 | Write-Host
            throw "Control Center smoke report violates the session history contract"
          }
          $data | ConvertTo-Json -Depth 8 | Write-Host

name: PR70 Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest-report:
    if: github.event.pull_request.number == 70
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run full pytest and preserve JUnit report
        id: tests
        continue-on-error: true
        run: python -m pytest --junitxml=pytest-report.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr70-pytest-report
          path: pytest-report.xml
          if-no-files-found: error
      - name: Preserve failing status
        if: steps.tests.outcome != 'success'
        run: exit 1

name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/poc-0-bootstrap, gpt/ghb2-d-final-editing-gate]

permissions:
  contents: read

jobs:
  ghb2d-bootstrap:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} / GHB2-D bootstrap
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile GHB2-D
        run: |
          python -m py_compile bdb_bridge/multi_file_patch_runtime_models.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime_migration.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime_journal.py
          python -m py_compile bdb_bridge/multi_file_patch_gate.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime.py
          python -m py_compile bdb_bridge/multi_file_patch_result.py
          python -m py_compile bdb_bridge/multi_file_patch_lifecycle.py
          python -m py_compile bdb_bridge/__init__.py
          python -m py_compile bdb_bridge/ghb07_composition.py
      - name: Import Bridge
        run: python -c "import bdb_bridge; print(len(bdb_bridge.migrations.MIGRATIONS) if hasattr(bdb_bridge, 'migrations') else 'imported')"

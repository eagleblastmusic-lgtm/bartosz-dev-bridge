name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/ghb2-c-durable-batch-recovery]

permissions:
  contents: read

jobs:
  ghb2c-integration:
    name: Ubuntu / Python 3.12 / GHB2-C integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile changed and adjacent surfaces
        run: |
          python -m py_compile bdb_bridge/multi_file_patch_executor.py
          python -m py_compile bdb_bridge/multi_file_patch_hardening.py
          python -m py_compile bdb_bridge/multi_file_patch_temp_identity.py
          python -m py_compile bdb_bridge/multi_file_patch_migration.py
          python -m py_compile bdb_bridge/workspace_manager.py
          python -m py_compile tests/test_multi_file_patch_recovery.py
          python -m py_compile tests/test_multi_file_patch_v9_contracts.py
      - name: Run GHB2-C and adjacent integrations
        run: |
          python -m pytest -q \
            tests/test_multi_file_patch_recovery.py \
            tests/test_multi_file_patch_v9_contracts.py \
            tests/test_multi_file_patch_planner.py \
            tests/test_multi_file_patch_aliases.py \
            tests/test_structural_edit_engine.py \
            tests/test_workspace_manager.py \
            tests/test_workspace_lifecycle.py \
            tests/test_workspace_lifecycle_recovery.py \
            tests/test_workspace_cleanup_safety.py \
            tests/test_workspace_recovery_faults.py \
            tests/test_journal_migrations.py \
            tests/test_result_outbox_migrations.py \
            tests/test_service_lifecycle_migrations.py \
            tests/test_workspace_recovery_migrations.py \
            tests/test_workspace_lifecycle_migrations.py \
            tests/test_repository_index_migrations.py \
            tests/test_code_relationship_migrations.py
      - name: Check exact-base whitespace
        run: git diff --check 478d246ed3b80487826872b285d5ee14420564cf...HEAD

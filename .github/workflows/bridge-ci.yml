name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/ghb2-d-final-editing-gate]

permissions:
  contents: read

jobs:
  v10-migration-diagnostic:
    name: Ubuntu / Python 3.12 / v10 migration diagnostic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Capture v10 checksum and migration failures
        continue-on-error: true
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          from bdb_bridge.multi_file_patch_runtime_migration import MIGRATION_V10

          tests = [
              "tests/test_journal_migrations.py",
              "tests/test_result_outbox_migrations.py",
              "tests/test_service_lifecycle_migrations.py",
              "tests/test_workspace_recovery_migrations.py",
              "tests/test_workspace_lifecycle_migrations.py",
              "tests/test_repository_index_migrations.py",
              "tests/test_code_relationship_migrations.py",
              "tests/test_multi_file_patch_v9_contracts.py",
          ]
          process = subprocess.run(
              ["python", "-m", "pytest", "-q", *tests],
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              encoding="utf-8",
          )
          output = "V10_CHECKSUM=" + MIGRATION_V10.checksum() + "\n" + process.stdout
          pathlib.Path("v10-migration.log").write_text(output, encoding="utf-8")
          pathlib.Path("v10-migration.exit").write_text(str(process.returncode), encoding="ascii")
          PY
      - name: Upload v10 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v10-migration-diagnostic
          path: |
            v10-migration.log
            v10-migration.exit
          if-no-files-found: error
      - name: Enforce migration result
        run: python -c "import pathlib,sys; sys.exit(int(pathlib.Path('v10-migration.exit').read_text()))"

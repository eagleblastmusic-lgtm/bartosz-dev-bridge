name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/poc-0-bootstrap]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Validate PowerShell syntax
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $scripts = @(
            "scripts/bootstrap_windows.ps1",
            "scripts/bootstrap_poc0b_windows.ps1",
            "scripts/run_poc_bridge.ps1",
            "scripts/Invoke-GHB0RecoveryGate.ps1",
            "scripts/Invoke-BDBLocalE2E.ps1",
            "scripts/Invoke-BDBPersistentPilot.ps1",
            "scripts/Invoke-BDBGitHubPilot.ps1",
            "scripts/Invoke-BDBDirectLanePilot.ps1",
            "scripts/Invoke-BDBLocalBrowserPilot.ps1",
            "scripts/Invoke-BDBWorkspaceLoop.ps1",
            "scripts/Install-BDBNativeHost.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$script`: $($_.Message)" }
              exit 1
            }
          }
      - name: Compile Bridge
        run: |
          python -m py_compile poc_bridge.py
          python -m py_compile scripts/run_persistent_pilot.py
          python -m py_compile scripts/prepare_github_pilot.py
          python -m py_compile scripts/run_direct_lane_pilot.py
          python -m py_compile scripts/run_direct_lane_pilot_checked.py
          python -m py_compile scripts/prepare_local_browser_pilot.py
          python -m py_compile scripts/prepare_workspace_loop.py
          python -m py_compile scripts/run_workspace_promoter.py
          python -c "import pathlib, py_compile; [py_compile.compile(str(p)) for p in pathlib.Path('bdb_bridge').glob('*.py')]"
          python -c "import pathlib, py_compile; [py_compile.compile(str(p)) for p in pathlib.Path('bdb_poc').glob('*.py')]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run local browser pilot lifecycle
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-local-browser-pilot"
          $extensionId = "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          $setup = .\scripts\Invoke-BDBLocalBrowserPilot.ps1 `
            -Action Setup `
            -Browser Chrome `
            -ExtensionId $extensionId `
            -Python (Get-Command python).Source `
            -Root $root | ConvertFrom-Json
          if ($setup.status -ne "RUNNING" -or $setup.repo_alias -ne "pilot") {
            throw "Local browser pilot setup did not reach RUNNING"
          }
          $status = .\scripts\Invoke-BDBLocalBrowserPilot.ps1 `
            -Action Status `
            -Root $root | ConvertFrom-Json
          if ($status.bridge.status -ne "RUNNING" -or $status.native_host.armed -ne $true) {
            throw "Local browser pilot status is not RUNNING and ARMED"
          }
          $stop = .\scripts\Invoke-BDBLocalBrowserPilot.ps1 `
            -Action Stop `
            -Root $root | ConvertFrom-Json
          if ($stop.status -ne "OFFLINE" -or $stop.artifacts_preserved -ne $true) {
            throw "Local browser pilot did not stop safely"
          }
      - name: Run local workspace loop lifecycle
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: |
          $source = Join-Path $env:RUNNER_TEMP "bdb-workspace-loop-source"
          $root = Join-Path $env:RUNNER_TEMP "bdb-workspace-loop"
          git init $source
          git -C $source config user.name "Workspace Loop CI"
          git -C $source config user.email "workspace-loop-ci@example.invalid"
          "VALUE = 1" | Set-Content -LiteralPath (Join-Path $source "app.py") -Encoding utf8
          git -C $source add -- app.py
          git -C $source commit -m "baseline"

          $prepare = .\scripts\Invoke-BDBWorkspaceLoop.ps1 `
            -Action Prepare `
            -Root $root `
            -Repo $source `
            -Alias "workspace-ci" `
            -AllowedPath @("app.py") `
            -Python (Get-Command python).Source | ConvertFrom-Json
          if ($prepare.status -ne "PREPARED" -or $prepare.alias -ne "workspace-ci") {
            throw "Workspace loop preparation failed"
          }

          $start = .\scripts\Invoke-BDBWorkspaceLoop.ps1 `
            -Action Start `
            -Root $root `
            -ArmMinutes 5 | ConvertFrom-Json
          if ($start.status -ne "RUNNING" -or $start.promoter.running -ne $true) {
            throw "Workspace loop did not start"
          }

          $status = .\scripts\Invoke-BDBWorkspaceLoop.ps1 `
            -Action Status `
            -Root $root | ConvertFrom-Json
          if ($status.status -ne "READY" -or $status.source_clean -ne $true) {
            throw "Workspace loop is not ready"
          }

          $stop = .\scripts\Invoke-BDBWorkspaceLoop.ps1 `
            -Action Stop `
            -Root $root | ConvertFrom-Json
          if ($stop.status -ne "OFFLINE" -or $stop.artifacts_preserved -ne $true) {
            throw "Workspace loop did not stop safely"
          }
      - name: Run local E2E POC gate
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: .\scripts\Invoke-BDBLocalE2E.ps1 -Python (Get-Command python).Source
      - name: Run persistent operator pilot
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-persistent-pilot"
          .\scripts\Invoke-BDBPersistentPilot.ps1 -Python (Get-Command python).Source -Root $root
      - name: Run Direct Lane Native pilot
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-direct-lane-pilot"
          .\scripts\Invoke-BDBDirectLanePilot.ps1 `
            -Python (Get-Command python).Source `
            -Root $root `
            -TimeoutSeconds 120
      - name: Prepare private GitHub pilot smoke
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: |
          $remote = Join-Path $env:RUNNER_TEMP "github-pilot-control.git"
          $seed = Join-Path $env:RUNNER_TEMP "github-pilot-seed"
          $root = Join-Path $env:RUNNER_TEMP "bdb-github-pilot"
          git init --bare $remote
          git clone $remote $seed
          git -C $seed config user.name "CI Pilot"
          git -C $seed config user.email "ci@example.invalid"
          "seed" | Set-Content -Path (Join-Path $seed "README.md") -Encoding utf8
          git -C $seed add -- README.md
          git -C $seed commit -m "seed"
          git -C $seed branch -M main
          git -C $seed push origin main
          git -C $seed switch -c commands
          git -C $seed push origin commands
          git -C $seed switch main
          git -C $seed switch -c results
          git -C $seed push origin results
          .\scripts\Invoke-BDBGitHubPilot.ps1 `
            -Python (Get-Command python).Source `
            -ControlUrl $remote `
            -Root $root `
            -PrepareOnly
          $report = Get-Content (Join-Path $root "github-pilot-report.json") -Raw | ConvertFrom-Json
          if ($report.status -ne "prepared") {
            throw "GitHub pilot preparation did not finish in prepared state"
          }

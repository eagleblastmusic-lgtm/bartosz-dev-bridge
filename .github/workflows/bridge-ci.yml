name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/ghb2-c-durable-batch-recovery]

permissions:
  contents: read

jobs:
  targeted-diagnostic:
    name: Ubuntu / Python 3.12 / targeted diagnostic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile GHB2-C
        run: |
          python -m py_compile bdb_bridge/multi_file_patch_migration.py
          python -m py_compile bdb_bridge/multi_file_patch_recovery_models.py
          python -m py_compile bdb_bridge/multi_file_patch_journal.py
          python -m py_compile bdb_bridge/multi_file_patch_executor.py
          python -m py_compile bdb_bridge/multi_file_patch_hardening.py
          python -m py_compile tests/test_multi_file_patch_recovery.py
      - name: Capture targeted test output
        continue-on-error: true
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          process = subprocess.run(
              ["python", "-m", "pytest", "-q", "tests/test_multi_file_patch_recovery.py"],
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              encoding="utf-8",
          )
          pathlib.Path("targeted-ghb2c.log").write_text(process.stdout, encoding="utf-8")
          pathlib.Path("targeted-ghb2c.exit").write_text(str(process.returncode), encoding="ascii")
          PY
      - name: Upload targeted diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: targeted-ghb2c-diagnostic
          path: |
            targeted-ghb2c.log
            targeted-ghb2c.exit
          if-no-files-found: error
      - name: Enforce targeted result
        run: python -c "import pathlib,sys; sys.exit(int(pathlib.Path('targeted-ghb2c.exit').read_text()))"

name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/ghb2-c-durable-batch-recovery]

permissions:
  contents: read

jobs:
  migration-contracts:
    name: Ubuntu / Python 3.12 / migration contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile migration surfaces
        run: |
          python -m py_compile bdb_bridge/multi_file_patch_migration.py
          python -m py_compile tests/test_journal_migrations.py
          python -m py_compile tests/test_result_outbox_migrations.py
          python -m py_compile tests/test_service_lifecycle_migrations.py
          python -m py_compile tests/test_workspace_recovery_migrations.py
          python -m py_compile tests/test_workspace_lifecycle_migrations.py
          python -m py_compile tests/test_repository_index_migrations.py
          python -m py_compile tests/test_code_relationship_migrations.py
      - name: Run migration contracts
        run: |
          python -m pytest -q \
            tests/test_journal_migrations.py \
            tests/test_result_outbox_migrations.py \
            tests/test_service_lifecycle_migrations.py \
            tests/test_workspace_recovery_migrations.py \
            tests/test_workspace_lifecycle_migrations.py \
            tests/test_repository_index_migrations.py \
            tests/test_code_relationship_migrations.py
      - name: Check whitespace
        run: git diff --check 478d246ed3b80487826872b285d5ee14420564cf...HEAD

name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/poc-0-bootstrap, gpt/ghb2-d-final-editing-gate]

permissions:
  contents: read

jobs:
  ghb2d-targeted:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} / GHB2-D targeted
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Validate PowerShell syntax
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $scripts = @(
            "scripts/bootstrap_windows.ps1",
            "scripts/bootstrap_poc0b_windows.ps1",
            "scripts/run_poc_bridge.ps1",
            "scripts/Invoke-GHB0RecoveryGate.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$script`: $($_.Message)" }
              exit 1
            }
          }
      - name: Compile GHB2-D
        run: |
          python -m py_compile bdb_bridge/multi_file_patch_runtime_models.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime_migration.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime_journal.py
          python -m py_compile bdb_bridge/multi_file_patch_gate.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime.py
          python -m py_compile bdb_bridge/multi_file_patch_result.py
          python -m py_compile bdb_bridge/multi_file_patch_lifecycle.py
          python -m py_compile bdb_bridge/multi_file_patch_checkpoint_hook.py
          python -m py_compile tests/test_ghb2d_final_editing_gate.py
      - name: Run GHB2-D targeted tests
        run: python -m pytest -q tests/test_ghb2d_final_editing_gate.py

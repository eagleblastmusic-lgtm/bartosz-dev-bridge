name: Bridge CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  audit-fix:
    name: apply GHB1-C canonical hash and sensitive-path fixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: gpt/ghb1-c-context-pack-gate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Apply exact audit fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          service_path = Path("bdb_bridge/context_pack_service.py")
          text = service_path.read_text(encoding="utf-8")
          old = "from dataclasses import dataclass, field\n"
          new = "from dataclasses import dataclass, field\nfrom pathlib import PurePosixPath\n"
          if text.count(old) != 1:
              raise SystemExit("unexpected context pack imports")
          text = text.replace(old, new, 1)

          old = (
              '        reason = ",".join(sorted(candidate.reasons))\n'
              '        if record.file_kind is not FileKind.REGULAR:\n'
          )
          new = (
              '        reason = ",".join(sorted(candidate.reasons))\n'
              '        if _is_sensitive_path(record.path):\n'
              '            return ContextFile(record.path, record.language, record.content_sha256, record.size_bytes, reason, candidate.priority, "sensitive_path", ()), 0, False\n'
              '        if record.file_kind is not FileKind.REGULAR:\n'
          )
          if text.count(old) != 1:
              raise SystemExit("unexpected materialize source")
          text = text.replace(old, new, 1)

          marker = "\ndef _direction(value: str) -> ContextDirection:\n"
          helper = "\n".join([
              "def _is_sensitive_path(path: str) -> bool:",
              "    pure = PurePosixPath(path)",
              "    name = pure.name.casefold()",
              '    if name == ".env" or name.startswith(".env."):',
              "        return True",
              '    if name in {"id_rsa", "id_ed25519", "credentials.json", "service-account.json"}:',
              "        return True",
              '    return pure.suffix.casefold() in {".pem", ".key", ".p12", ".pfx", ".jks", ".keystore"}',
              "",
          ]) + "\n"
          if text.count(marker) != 1:
              raise SystemExit("unexpected direction marker")
          text = text.replace(marker, "\n" + helper + marker, 1)

          old = 'json.dumps(payload, sort_keys=True, separators=(",", ":"), ensure_ascii=False).encode("utf-8")'
          new = 'json.dumps(payload, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode("utf-8")'
          if text.count(old) != 1:
              raise SystemExit("unexpected canonical json source")
          service_path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          test_path = Path("tests/test_context_pack_core.py")
          text = test_path.read_text(encoding="utf-8")
          old = 'digest_payload, sort_keys=True, separators=(",", ":"), ensure_ascii=False'
          new = 'digest_payload, sort_keys=True, separators=(",", ":"), ensure_ascii=True'
          if text.count(old) != 1:
              raise SystemExit("unexpected hash assertion")
          text = text.replace(old, new, 1)
          marker = "\ndef test_large_repository_gate_reports_limits_and_bounded_sample(tmp_path: Path) -> None:\n"
          regression = "\n".join([
              "",
              "def test_context_hash_matches_cli_unicode_and_sensitive_paths_are_metadata_only(tmp_path: Path) -> None:",
              "    cfg, journal, fixture, commits = make_relationship_fixture(tmp_path)",
              '    write_text(fixture, "pkg/unicode_mod.py", "def żółw():\\n    return \'zażółć\'\\n")',
              '    write_text(fixture, ".env.production", "SECRET_TOKEN=must-not-be-exported\\n")',
              '    git(fixture, "add", "-A")',
              '    git(fixture, "commit", "-m", "add unicode and sensitive fixtures")',
              '    commit = git(fixture, "rev-parse", "HEAD")',
              "    RepositoryIndexService(cfg, journal).index(commit)",
              "    RepositoryRelationshipService(cfg, journal).analyze(commit)",
              "    service = ContextPackService(cfg, journal)",
              '    unicode_pack = service.build(ref=commit, query="żółw", max_files=3, max_bytes=4096)',
              "    payload = context_pack_dict(unicode_pack)",
              "    digest_payload = dict(payload)",
              '    digest_payload.pop("pack_sha256")',
              '    expected = hashlib.sha256(json.dumps(digest_payload, sort_keys=True, separators=(",", ":")).encode("utf-8")).hexdigest()',
              "    assert unicode_pack.pack_sha256 == expected",
              '    sensitive = service.build(ref=commit, path=".env.production", depth=0, max_files=1, max_bytes=4096)',
              '    assert sensitive.files[0].omitted_reason == "sensitive_path"',
              "    assert sensitive.files[0].excerpts == ()",
              '    assert "must-not-be-exported" not in json.dumps(context_pack_dict(sensitive), sort_keys=True)',
              "    journal.close()",
              "",
          ])
          if text.count(marker) != 1:
              raise SystemExit("unexpected gate test marker")
          test_path.write_text(text.replace(marker, regression + marker, 1), encoding="utf-8", newline="\n")

          docs_path = Path("docs/GHB1C_CONTEXT_PACK.md")
          text = docs_path.read_text(encoding="utf-8")
          old = "Pack nie zawiera timestampu. `pack_sha256` jest SHA-256 kanonicznego JSON-u wszystkich pól packu poza samym `pack_sha256`."
          new = "Pack nie zawiera timestampu. `pack_sha256` jest SHA-256 tej samej kanonicznej reprezentacji JSON (`sort_keys=True`, zwarte separatory, standardowe escaping Unicode), której używa CLI, dla wszystkich pól packu poza samym `pack_sha256`."
          if text.count(old) != 1:
              raise SystemExit("unexpected hash documentation")
          text = text.replace(old, new, 1)
          old = "Pliki binary, symlink i submodule są metadata-only. Regularny plik większy niż 1 MiB również nie jest wczytywany do packu. Każdy odczytany blob jest weryfikowany względem trwałego `content_sha256` snapshotu."
          new = "Pliki binary, symlink i submodule są metadata-only. Regularny plik większy niż 1 MiB również nie jest wczytywany do packu. Typowe committed secret paths (`.env*`, klucze prywatne, keystore oraz jawne pliki credentials/service-account) są zawsze metadata-only z `omitted_reason=sensitive_path`. Każdy pozostały odczytany blob jest weryfikowany względem trwałego `content_sha256` snapshotu."
          if text.count(old) != 1:
              raise SystemExit("unexpected source omission documentation")
          docs_path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")
          PY
      - name: Compile changed files
        run: |
          python -m py_compile bdb_bridge/context_pack_service.py tests/test_context_pack_core.py
      - name: Run targeted GHB1-C tests
        run: python -m pytest -q tests/test_context_pack_core.py tests/test_context_pack_cli.py
      - name: Restore standard workflow
        shell: bash
        run: git show origin/main:.github/workflows/bridge-ci.yml > .github/workflows/bridge-ci.yml
      - name: Validate and push exact audit fixes
        shell: bash
        run: |
          cmp .github/workflows/bridge-ci.yml <(git show origin/main:.github/workflows/bridge-ci.yml)
          git diff --check
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              ".github/workflows/bridge-ci.yml",
              "bdb_bridge/context_pack_service.py",
              "docs/GHB1C_CONTEXT_PACK.md",
              "tests/test_context_pack_core.py",
          }
          actual = set(subprocess.check_output(["git", "diff", "--cached", "--name-only"], text=True).splitlines())
          if actual != expected:
              raise SystemExit(f"unexpected staged files: {sorted(actual)}")
          PY
          git config user.name "Bartosz Dev Bridge CI"
          git config user.email "bridge-ci@localhost.invalid"
          git commit -m "fix(context): align canonical hash and omit sensitive paths"
          git push origin HEAD:gpt/ghb1-c-context-pack-gate

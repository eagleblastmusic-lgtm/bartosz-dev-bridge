name: Bridge CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    name: apply Python class-scope resolver fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: gpt/ghb1-b-code-relationships
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Apply exact three-file fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("bdb_bridge/code_relationship_analyzer.py")
          text = path.read_text(encoding="utf-8")
          old = (
              "        if isinstance(node, ast.Name):\n"
              "            current: _Scope | None = scope\n"
              "            while current:\n"
              "                if node.id in current.bindings:\n"
              "                    return current.bindings[node.id].resolution\n"
              "                if node.id in current.shadowed:\n"
              "                    return _Resolution(None, None, ResolutionStatus.DYNAMIC, Confidence.NONE, \"name is locally bound\")\n"
              "                current = current.parent\n"
              "            return _Resolution(None, None, ResolutionStatus.UNRESOLVED, Confidence.NONE, \"name not found\")\n"
          )
          new = (
              "        if isinstance(node, ast.Name):\n"
              "            for current in _lexical_scopes(scope):\n"
              "                if node.id in current.bindings:\n"
              "                    return current.bindings[node.id].resolution\n"
              "                if node.id in current.shadowed:\n"
              "                    return _Resolution(None, None, ResolutionStatus.DYNAMIC, Confidence.NONE, \"name is locally bound\")\n"
              "            return _Resolution(None, None, ResolutionStatus.UNRESOLVED, Confidence.NONE, \"name not found\")\n"
          )
          if text.count(old) != 1:
              raise SystemExit("unexpected ast.Name resolver source")
          text = text.replace(old, new, 1)
          old = (
              "def _lookup(name: str, scope: _Scope) -> _Binding | None:\n"
              "    while scope:\n"
              "        if name in scope.bindings: return scope.bindings[name]\n"
              "        if name in scope.shadowed: return None\n"
              "        scope = scope.parent\n"
              "    return None\n"
          )
          new = (
              "def _lexical_scopes(scope: _Scope):\n"
              "    current: _Scope | None = scope\n"
              "    skip_class_scopes = scope.kind == \"function\"\n"
              "    while current:\n"
              "        yield current\n"
              "        current = current.parent\n"
              "        if skip_class_scopes:\n"
              "            while current is not None and current.kind == \"class\":\n"
              "                current = current.parent\n"
              "\n\n"
              "def _lookup(name: str, scope: _Scope) -> _Binding | None:\n"
              "    for current in _lexical_scopes(scope):\n"
              "        if name in current.bindings: return current.bindings[name]\n"
              "        if name in current.shadowed: return None\n"
              "    return None\n"
          )
          if text.count(old) != 1:
              raise SystemExit("unexpected lookup helper source")
          path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          path = Path("tests/helpers/code_relationship_fixture.py")
          text = path.read_text(encoding="utf-8")
          old = "def recursive():\n    return recursive()\n\n\ndef shadow(helper):\n"
          new = "def recursive():\n    return recursive()\n\n\ndef local():\n    return 3\n\n\ndef shadow(helper):\n"
          if text.count(old) != 1:
              raise SystemExit("unexpected fixture module source")
          text = text.replace(old, new, 1)
          old = (
              "class Child(Base):\n"
              "    def local(self):\n"
              "        return 2\n"
              "\n"
              "    def run(self):\n"
              "        return self.local()\n"
              "\n\n"
              "def unknown(obj):\n"
          )
          new = (
              "class Child(Base):\n"
              "    def local(self):\n"
              "        return 2\n"
              "\n"
              "    def run(self):\n"
              "        return self.local()\n"
              "\n"
              "    @classmethod\n"
              "    def run_via_cls(cls):\n"
              "        return cls.local()\n"
              "\n"
              "    def run_unqualified(self):\n"
              "        return local()\n"
              "\n\n"
              "def unknown(obj):\n"
          )
          if text.count(old) != 1:
              raise SystemExit("unexpected fixture class source")
          path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          path = Path("tests/test_code_relationship_core.py")
          text = path.read_text(encoding="utf-8")
          old = (
              "    assert any(item.resolution_status is ResolutionStatus.RESOLVED for item in by_expression[\"self.local\"])\n"
              "    assert any(item.resolution_status is ResolutionStatus.DYNAMIC for item in by_expression[\"helper\"])\n"
          )
          new = (
              "    _, module_local = service.select_symbol(\n"
              "        ref=commits[\"commit1\"], path=\"pkg/service.py\", qualified_name=\"local\"\n"
              "    )\n"
              "    _, class_local = service.select_symbol(\n"
              "        ref=commits[\"commit1\"], path=\"pkg/service.py\", qualified_name=\"Child.local\"\n"
              "    )\n"
              "    assert any(\n"
              "        item.resolution_status is ResolutionStatus.RESOLVED\n"
              "        and item.target_symbol_id == class_local.symbol_id\n"
              "        for item in by_expression[\"self.local\"]\n"
              "    )\n"
              "    assert any(\n"
              "        item.resolution_status is ResolutionStatus.RESOLVED\n"
              "        and item.target_symbol_id == class_local.symbol_id\n"
              "        for item in by_expression[\"cls.local\"]\n"
              "    )\n"
              "    assert any(\n"
              "        item.resolution_status is ResolutionStatus.RESOLVED\n"
              "        and item.target_symbol_id == module_local.symbol_id\n"
              "        for item in by_expression[\"local\"]\n"
              "    )\n"
              "    assert all(item.target_symbol_id != class_local.symbol_id for item in by_expression[\"local\"])\n"
              "    assert any(item.resolution_status is ResolutionStatus.DYNAMIC for item in by_expression[\"helper\"])\n"
          )
          if text.count(old) != 1:
              raise SystemExit("unexpected core assertion source")
          path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")
          PY
      - name: Compile changed files
        run: |
          python -m py_compile \
            bdb_bridge/code_relationship_analyzer.py \
            tests/helpers/code_relationship_fixture.py \
            tests/test_code_relationship_core.py
      - name: Run targeted GHB1-B tests
        run: |
          python -m pytest -q \
            tests/test_code_relationship_core.py \
            tests/test_code_relationship_cli.py \
            tests/test_code_relationship_migrations.py
      - name: Restore standard workflow
        shell: bash
        run: git show origin/main:.github/workflows/bridge-ci.yml > .github/workflows/bridge-ci.yml
      - name: Validate and push exact fix
        shell: bash
        run: |
          cmp .github/workflows/bridge-ci.yml <(git show origin/main:.github/workflows/bridge-ci.yml)
          git diff --check
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              ".github/workflows/bridge-ci.yml",
              "bdb_bridge/code_relationship_analyzer.py",
              "tests/helpers/code_relationship_fixture.py",
              "tests/test_code_relationship_core.py",
          }
          actual = set(subprocess.check_output(
              ["git", "diff", "--cached", "--name-only"], text=True
          ).splitlines())
          if actual != expected:
              raise SystemExit(f"unexpected staged files: {sorted(actual)}")
          PY
          git config user.name "Bartosz Dev Bridge CI"
          git config user.email "bridge-ci@localhost.invalid"
          git commit -m "fix(analysis): respect Python class scope lookup"
          git push origin HEAD:gpt/ghb1-b-code-relationships

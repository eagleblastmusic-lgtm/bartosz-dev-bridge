name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/ghb2-d-final-editing-gate]

permissions:
  contents: read

jobs:
  ghb2d-first-failure:
    name: Ubuntu / Python 3.12 / first GHB2-D failure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Run first failing GHB2-D test
        run: python -m pytest -x -vv tests/test_ghb2d_final_editing_gate.py

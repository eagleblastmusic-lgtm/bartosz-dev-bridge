name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/ghb2-d-final-editing-gate]

permissions:
  contents: read

jobs:
  ghb2d-integration:
    name: Ubuntu / Python 3.12 / GHB2-D integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile changed and adjacent surfaces
        run: |
          python -m py_compile bdb_bridge/multi_file_patch_runtime.py
          python -m py_compile bdb_bridge/multi_file_patch_runtime_journal.py
          python -m py_compile bdb_bridge/multi_file_patch_result.py
          python -m py_compile bdb_bridge/multi_file_patch_gate.py
          python -m py_compile bdb_bridge/multi_file_patch_cli.py
          python -m py_compile bdb_bridge/ghb07_composition.py
          python -m py_compile tests/test_ghb2d_final_editing_gate.py
          python -m py_compile tests/test_multi_file_patch_cli.py
      - name: Run GHB2-D integration bundle
        run: |
          python -m pytest -q \
            tests/test_ghb2d_final_editing_gate.py \
            tests/test_multi_file_patch_cli.py \
            tests/test_multi_file_patch_recovery.py \
            tests/test_multi_file_patch_v9_contracts.py \
            tests/test_multi_file_patch_v10_contracts.py \
            tests/test_multi_file_patch_planner.py \
            tests/test_multi_file_patch_aliases.py \
            tests/test_durable_ingestion.py \
            tests/test_durable_ingestion_additional.py \
            tests/test_transport_retry.py \
            tests/test_single_queue_scheduler.py \
            tests/test_profile_runner.py \
            tests/test_result_outbox_recovery.py \
            tests/test_bridge_service_cycle.py \
            tests/test_bridge_service_recovery.py \
            tests/test_service_durable_recovery.py \
            tests/test_workspace_recovery_faults.py \
            tests/test_workspace_lifecycle.py \
            tests/test_workspace_lifecycle_recovery.py \
            tests/test_workspace_cleanup_safety.py \
            tests/test_journal_migrations.py \
            tests/test_result_outbox_migrations.py \
            tests/test_service_lifecycle_migrations.py \
            tests/test_workspace_recovery_migrations.py \
            tests/test_workspace_lifecycle_migrations.py \
            tests/test_repository_index_migrations.py \
            tests/test_code_relationship_migrations.py
      - name: Check exact-base whitespace
        run: git diff --check ec22ae6440a0343306f11212b924bc84ce27edc2...HEAD

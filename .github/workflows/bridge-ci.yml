name: Bridge CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [gpt/poc-0-bootstrap]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Validate PowerShell syntax
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $scripts = @(
            "scripts/bootstrap_windows.ps1",
            "scripts/bootstrap_poc0b_windows.ps1",
            "scripts/run_poc_bridge.ps1",
            "scripts/Invoke-GHB0RecoveryGate.ps1",
            "scripts/Invoke-BDBLocalE2E.ps1",
            "scripts/Invoke-BDBPersistentPilot.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$script`: $($_.Message)" }
              exit 1
            }
          }
      - name: Compile Bridge
        run: |
          python -m py_compile poc_bridge.py
          python -m py_compile scripts/run_persistent_pilot.py
          python -c "import pathlib, py_compile; [py_compile.compile(str(p)) for p in pathlib.Path('bdb_bridge').glob('*.py')]"
          python -c "import pathlib, py_compile; [py_compile.compile(str(p)) for p in pathlib.Path('bdb_poc').glob('*.py')]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run local E2E POC gate
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: .\scripts\Invoke-BDBLocalE2E.ps1 -Python (Get-Command python).Source
      - name: Run persistent operator pilot
        if: runner.os == 'Windows' && matrix.python-version == '3.14'
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-persistent-pilot"
          .\scripts\Invoke-BDBPersistentPilot.ps1 -Python (Get-Command python).Source -Root $root

name: Bridge CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    name: export GHB1-B source diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ghb1b-source
          path: |
            bdb_bridge
            bdb_poc
            tests
            pyproject.toml
            poc_bridge.py
          retention-days: 1

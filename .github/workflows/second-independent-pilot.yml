name: Second Independent Pilot

on:
  push:
    branches:
      - gpt-work/second-independent-pilot
  pull_request:
    branches:
      - gpt-work/one-message-repair-pilot
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-test:
    name: Full pytest / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile second pilot modules
        run: |
          python -m py_compile bdb_bridge/fixed_test_profiles.py
          python -m py_compile bdb_bridge/fixed_test_profile_support.py
          python -m py_compile bdb_bridge/unittest_repair_loop.py
          python -m py_compile bdb_bridge/second_pilot_fixture.py
          python -m py_compile bdb_bridge/second_independent_pilot.py
      - name: Run full test suite
        run: python -m pytest -q

  pilot:
    name: Windows / Python 3.14 / inventory2-unittest-repair
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Validate focused contracts
        run: |
          python -m py_compile bdb_bridge/fixed_test_profiles.py
          python -m py_compile bdb_bridge/fixed_test_profile_support.py
          python -m py_compile bdb_bridge/unittest_repair_loop.py
          python -m py_compile bdb_bridge/second_pilot_fixture.py
          python -m py_compile bdb_bridge/second_independent_pilot.py
          python -m pytest -q tests/test_fixed_test_profiles.py tests/test_second_independent_pilot_contract.py tests/test_ghb2d_final_editing_gate.py
      - name: Validate PowerShell entrypoint syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/Invoke-BDBSecondIndependentPilot.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Run second independent pilot
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-second-independent-pilot"
          .\scripts\Invoke-BDBSecondIndependentPilot.ps1 `
            -Python (Get-Command python).Source `
            -Root $root `
            -TimeoutSeconds 180
          $report = Get-Content (Join-Path $root "second-independent-pilot-report.json") -Raw | ConvertFrom-Json
          if ($report.status -ne "pass") {
            throw "Second independent pilot did not pass"
          }
          if ($report.profile_id -ne "poc_unittest" -or $report.repo_alias -ne "inventory2") {
            throw "Second pilot did not use the independent fixed profile and alias"
          }
          if ($report.attempt_count -ne 2 -or $report.user_interventions_between_attempts -ne 0) {
            throw "Second pilot did not prove a bounded autonomous two-attempt loop"
          }
          if ($report.initial_attempt.rollback_performed -ne $true) {
            throw "Second pilot initial attempt did not prove rollback"
          }
          if ($report.repair_attempt.status -ne "success" -or $report.source_checkout_clean -ne $true) {
            throw "Second pilot repair promotion did not finish cleanly"
          }
      - name: Upload second pilot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdb-second-independent-pilot
          path: ${{ runner.temp }}/bdb-second-independent-pilot
          if-no-files-found: warn
          retention-days: 14

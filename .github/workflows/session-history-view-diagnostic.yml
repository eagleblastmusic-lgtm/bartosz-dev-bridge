name: Session History View Diagnostic

on:
  pull_request:
    branches: [gpt-work/control-center-operation-flow]
    paths:
      - ".github/workflows/session-history-view-diagnostic.yml"
      - "bdb_gui/session_history*.py"
      - "bdb_operator/session_projection.py"
      - "tests/test_gui_session_history_view*.py"
      - "tests/session_projection_fixture.py"
  push:
    branches: [gpt-work/control-center-session-receipts]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -e ".[dev,gui]"
      - name: Snapshot render and selection
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view_diagnostic.py::test_diag_snapshot_renders_and_selects_first_row
      - name: Action buttons enabled
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view_diagnostic.py::test_diag_action_buttons_are_enabled
      - name: Result opening
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view_diagnostic.py::test_diag_result_button_opens_validated_file
      - name: Receipt opening
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view_diagnostic.py::test_diag_receipt_button_opens_validated_file
      - name: Folder opening
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view_diagnostic.py::test_diag_folder_button_opens_validated_parent
      - name: Failed unpromoted session controls
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view.py::test_failed_unpromoted_session_disables_receipt_action
      - name: Empty read-only smoke
        env: { QT_QPA_PLATFORM: offscreen }
        run: python -m pytest -vv --tb=long tests/test_gui_session_history_view.py::test_empty_session_history_smoke_is_read_only

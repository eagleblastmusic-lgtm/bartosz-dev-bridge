name: Project Creator Cross-Platform Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/project-creator-cross-platform-diagnostic.yml"
      - "bdb_bridge/**"
      - "bdb_operator/**"
      - "browser_extension/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  partitions:
    name: Ubuntu / Python ${{ matrix.python-version }} / partitioned pytest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Browser static contracts
        run: >-
          python -m pytest -vv --tb=short
          tests/test_browser_auto_contract.py
          tests/test_browser_auto_loop_legacy_contract.py
          tests/test_browser_content_rerender_observer_contract.py
          tests/test_browser_extension_contract.py
      - name: Browser background runtimes
        run: >-
          python -m pytest -vv --tb=short
          tests/test_browser_auto_state_monotonic_runtime.py
          tests/test_browser_loop_id_roundtrip_runtime.py
          tests/test_browser_async_result_polling_runtime.py
          tests/test_browser_auto_loop_runtime.py
          tests/test_browser_auto_replay_recovery_runtime.py
          tests/test_browser_project_launcher_runtime.py
      - name: Browser content runtimes
        run: >-
          python -m pytest -vv --tb=short
          tests/test_browser_content_settle_reconciliation_runtime.py
          tests/test_browser_content_rerender_runtime.py
          tests/test_browser_auto_send_confirmation_runtime.py
          tests/test_browser_auto_decision_retry_runtime.py
      - name: Native Host partition
        run: python -m pytest -vv --tb=short -k "native or windowless"
      - name: Remaining non-GUI partition
        run: python -m pytest -vv --tb=short -k "not gui and not release and not browser and not native and not windowless"

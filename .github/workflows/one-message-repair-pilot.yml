name: One Message Repair Pilot

on:
  pull_request:
    branches:
      - main
      - gpt-work/control-center-0.2.1-stabilization
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pilot:
    name: Windows / Python 3.14 / failure-repair-promotion
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Validate pilot sources
        run: |
          python -m py_compile bdb_bridge/repair_loop.py
          python -m py_compile bdb_bridge/one_message_pilot_support.py
          python -m py_compile bdb_bridge/one_message_pilot_fixture.py
          python -m py_compile bdb_bridge/one_message_pilot.py
          python -m py_compile scripts/one_message_repair_pilot.py
          python -m pytest -q tests/test_repair_loop.py tests/test_one_message_repair_pilot_contract.py tests/test_one_message_pilot_fixture_contract.py
      - name: Validate PowerShell entrypoint syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/Invoke-BDBOneMessageRepairPilot.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Run one-message failure repair pilot
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-one-message-repair-pilot"
          .\scripts\Invoke-BDBOneMessageRepairPilot.ps1 `
            -Python (Get-Command python).Source `
            -Root $root `
            -TimeoutSeconds 180
          $report = Get-Content (Join-Path $root "one-message-repair-report.json") -Raw | ConvertFrom-Json
          if ($report.status -ne "pass") {
            throw "One-message repair pilot did not pass"
          }
          if ($report.attempt_count -ne 2 -or $report.user_interventions_between_attempts -ne 0) {
            throw "Pilot did not prove a bounded two-attempt autonomous loop"
          }
          if ($report.initial_attempt.rollback_performed -ne $true) {
            throw "Initial failed attempt did not prove rollback"
          }
          if ($report.repair_attempt.status -ne "success" -or $report.source_checkout_clean -ne $true) {
            throw "Repair promotion did not finish cleanly"
          }
      - name: Upload pilot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdb-one-message-repair-pilot
          path: ${{ runner.temp }}/bdb-one-message-repair-pilot
          if-no-files-found: warn
          retention-days: 14

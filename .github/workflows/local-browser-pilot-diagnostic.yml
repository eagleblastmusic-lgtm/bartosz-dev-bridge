name: Local Browser Pilot Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lifecycle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Run focused lifecycle
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-local-browser-diagnostic"
          $diagnostic = Join-Path $env:RUNNER_TEMP "bdb-local-browser-error.txt"
          try {
            $setup = .\scripts\Invoke-BDBLocalBrowserPilot.ps1 `
              -Action Setup `
              -Browser Chrome `
              -ExtensionId "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa" `
              -Python (Get-Command python).Source `
              -Root $root | ConvertFrom-Json
            $setup | ConvertTo-Json -Depth 20 | Out-File (Join-Path $env:RUNNER_TEMP "setup.json") -Encoding utf8
            $status = .\scripts\Invoke-BDBLocalBrowserPilot.ps1 -Action Status -Root $root | ConvertFrom-Json
            $status | ConvertTo-Json -Depth 20 | Out-File (Join-Path $env:RUNNER_TEMP "status.json") -Encoding utf8
            $stop = .\scripts\Invoke-BDBLocalBrowserPilot.ps1 -Action Stop -Root $root | ConvertFrom-Json
            $stop | ConvertTo-Json -Depth 20 | Out-File (Join-Path $env:RUNNER_TEMP "stop.json") -Encoding utf8
          }
          catch {
            $_ | Format-List * -Force | Out-File $diagnostic -Encoding utf8
            $_.Exception | Format-List * -Force | Out-File $diagnostic -Encoding utf8 -Append
            throw
          }
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-browser-pilot-diagnostics
          path: |
            ${{ runner.temp }}/bdb-local-browser-diagnostic
            ${{ runner.temp }}/bdb-local-browser-error.txt
            ${{ runner.temp }}/setup.json
            ${{ runner.temp }}/status.json
            ${{ runner.temp }}/stop.json
          if-no-files-found: warn

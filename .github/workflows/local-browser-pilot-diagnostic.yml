name: Local Browser Pilot Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  local-browser-pilot:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Run focused local browser pilot lifecycle
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $root = Join-Path $env:RUNNER_TEMP "bdb-local-browser-pilot-diagnostic"
          $transcript = Join-Path $env:RUNNER_TEMP "bdb-local-browser-pilot-transcript.txt"
          Start-Transcript -Path $transcript -Force
          try {
            .\scripts\Invoke-BDBLocalBrowserPilot.ps1 `
              -Action Setup `
              -Browser Chrome `
              -ExtensionId aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa `
              -Python (Get-Command python).Source `
              -Root $root
            .\scripts\Invoke-BDBLocalBrowserPilot.ps1 -Action Status -Root $root
            .\scripts\Invoke-BDBLocalBrowserPilot.ps1 -Action Stop -Root $root
          }
          catch {
            $_ | Format-List * -Force | Out-String | Write-Host
            throw
          }
          finally {
            Stop-Transcript
          }
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-browser-pilot-diagnostics
          path: |
            ${{ runner.temp }}/bdb-local-browser-pilot-transcript.txt
            ${{ runner.temp }}/bdb-local-browser-pilot-diagnostic
          if-no-files-found: warn

name: Direct Lane Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  direct-lane:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile pilot
        run: |
          python -m py_compile scripts/run_direct_lane_pilot.py
          python -m py_compile scripts/run_direct_lane_pilot_checked.py
      - name: Run Direct Lane Native pilot
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "bdb-direct-lane-diagnostic"
          .\scripts\Invoke-BDBDirectLanePilot.ps1 `
            -Python (Get-Command python).Source `
            -Root $root `
            -TimeoutSeconds 120
      - name: Upload Direct Lane diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-lane-focused-diagnostics
          path: ${{ runner.temp }}/bdb-direct-lane-diagnostic
          if-no-files-found: error

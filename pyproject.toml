[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "bartosz-dev-bridge"
version = "0.1.0"
description = "Minimal POC-0 bridge between ChatGPT, GitHub, and a local fixture repository"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

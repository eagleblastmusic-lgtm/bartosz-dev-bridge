<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bartosz Dev Bridge</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Bartosz Dev Bridge</h1>
      <label for="alias">Alias repozytorium</label>
      <input id="alias" type="text" pattern="[a-z][a-z0-9-]{0,31}" value="gicleeart" autocomplete="off">
      <div class="actions">
        <button id="status" type="button">Status hosta</button>
        <button id="context" type="button">Kontekst repo</button>
      </div>
      <fieldset>
        <legend>AUTO — jawne opt-in</legend>
        <label class="check"><input id="auto-enabled" type="checkbox"> Włącz AUTO dla akcji z `automation.mode=auto`</label>
        <label for="auto-iterations">Maks. iteracji (1–8)</label>
        <input id="auto-iterations" type="number" min="1" max="8" value="4">
        <label for="auto-minutes">Maks. minut (1–30)</label>
        <input id="auto-minutes" type="number" min="1" max="30" value="10">
        <button id="save-auto" type="button">Zapisz ustawienia AUTO</button>
      </fieldset>
      <pre id="output" aria-live="polite">Gotowy.</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
